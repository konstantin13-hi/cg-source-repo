project:
  name: UniversityDemo
  package: com.example.university

entities:
  Student:
    fields:
      id:
        type: Long

      name:
        type: String
        required: true
        min: 2
        max: 50

      email:
        type: String
        required: true
        pattern: email

  Course:
    fields:
      id:
        type: Long

      title:
        type: String
        required: true

      credits:
        type: Integer

  Teacher:
    fields:
      id:
        type: Long

      name:
        type: String
        required: true

      department:
        type: String

    relations:
      - type: ManyToMany
        target: Course
        field: courses